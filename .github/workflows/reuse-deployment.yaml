name: Deployment - Reusable Workflow

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      namespace:
        required: true
        type: string
      replicas:
        required: true
        type: string
      manifests_path:
        required: true
        type: string
      mongodb_uri:
        required: true
        type: string  
    outputs:
      APP_INGRESS_HOST:
        description: "Ingress hostname"
        value: ${{ jobs.reusable-deploy.outputs.APP_INGRESS_HOST }}   
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      KUBE_CONFIG:
        required: true
      MONGO_PASSWORD:
        required: true

jobs:
  reusable-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
      url: http://${{ steps.set-ingress-host-address.outputs.APP_INGRESS_HOST }}

    outputs:
      APP_INGRESS_HOST: ${{ steps.set-ingress-host-address.outputs.APP_INGRESS_HOST }}

    env:
      AWS_REGION: us-east-1
      NAMESPACE: ${{ inputs.namespace }}
      REPLICAS: ${{ inputs.replicas }}
      MANIFESTS_PATH: ${{ inputs.manifests_path }}
      K8S_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set kubeconfig file
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Install Kubectl CLI
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.24.17'

      - name: Fetch Kubernetes Cluster Details
        run: |
          kubectl version -o yaml
          echo "---------------------------------"
          kubectl get nodes

      - name: Save Nginx Ingress Controller Host as GitHub Environment Variable
        run: |
          echo "INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" >> $GITHUB_ENV

      - name: Replace Token in Manifest files
        uses: cschleiden/replace-tokens@v1
        with:
          tokenPrefix: '${'
          tokenSuffix: '}'
          files: '["${{ env.MANIFESTS_PATH }}/*.yaml"]'
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
          REPLICAS: ${{ env.REPLICAS }}
          K8S_IMAGE: ${{ env.K8S_IMAGE }}
          INGRESS_IP: ${{ env.INGRESS_IP }}

      - name: Check Files
        run: |
          cat ${{ env.MANIFESTS_PATH }}/*.yaml

      - name: Create MongoDB Secret
        run: |
          kubectl -n ${{ env.NAMESPACE }} create secret generic mongo-db-creds \
            --from-literal=MONGO_URI=${{ inputs.mongodb_uri}} \
            --from-literal=MONGO_USERNAME=${{ env.MONGO_USERNAME }} \
            --from-literal=MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }} \
            --save-config \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy to Environment
        run: |
          kubectl apply -f ${{ env.MANIFESTS_PATH }}

      - name: Set App Ingress Host URL
        id: set-ingress-host-address
        run: |
          echo "APP_INGRESS_HOST=$(kubectl -n ${{ env.NAMESPACE }} get ingress solar-system -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')" >> $GITHUB_OUTPUT