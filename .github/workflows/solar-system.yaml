name: Solar System Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'

env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
  unit-testing:
    name: Unit Testing
    services:
      mongo-db:
        image: siddharth67/mongo-db:non-prod
        ports:
          - 27017:27017
    env:
      MONGO_URI: 'mongodb://localhost:27017/superData'
      MONGO_USERNAME: non-prod-user
      MONGO_PASSWORD: non-prod-password
    strategy:
      matrix:
        nodejs_version: [18, 19, 20]
        operating_system: [ubuntu-latest]
        exclude:
          - nodejs_version: 18
            operating_system: macos-latest

    runs-on: ${{ matrix.operating_system }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS Version - ${{ matrix.nodejs_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.nodejs_version }}

      - name: Cache dependenciess
        uses: actions/cache@v4
        with:
            path: node_modules
            key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies
        run: npm install

      - name: Unit Testing
        id: nodejs_unit_testing_step
        run: npm test

      - name: Archive Test Result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Mocha-Test-Result-${{ matrix.nodejs_version }}-${{ matrix.operating_system }}
          path: test-results.xml

  code-coverage:
    name: Code Coverage
    container:
        image: node:18
    services:
      mongo-db:
        image: siddharth67/mongo-db:non-prod
        options: 
          --name mongo
    env:
      MONGO_URI: 'mongodb://mongo:27017/superData'
      MONGO_USERNAME: non-prod-user
      MONGO_PASSWORD: non-prod-password
          
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      #- name: Setup NodeJS Version - 18
      # uses: actions/setup-node@v4
      # with:
      #   node-version: 18

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
            path: node_modules
            key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies
        run: npm install

      - name: Check Code Coverage
        continue-on-error: true
        run: npm run coverage

      - name: Archive Test Result
        uses: actions/upload-artifact@v4
        with:
          name: Code-Coverage-Result
          path: test-results.xml

      - name: Archive Code Coverage Result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Code-Coverage-Result
          path: cobertura-coverage.xml

  reports-s3:
    needs: [code-coverage, unit-testing]
    name: AWS S3 - Upload Reports
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Merge Test Files
        run: |
          ls -ltr
          find downloaded-artifacts -type f

          mkdir reports-${{ github.sha }}

          find downloaded-artifacts -name "test-results.xml" -exec cp {} reports-${{ github.sha }}/ \;
          find downloaded-artifacts -name "cobertura-coverage.xml" -exec cp {} reports-${{ github.sha }}/ \;

          ls -ltr reports-${{ github.sha }}/

      - name: Upload to AWS S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-1'   # optional: defaults to us-east-1
          SOURCE_DIR: 'reports-${{ github.sha }}'      # optional: defaults to entire repository
          
           
  docker:
     name: Containerization
     needs: [code-coverage, unit-testing]
     runs-on: ubuntu-latest
     steps:
        - name: Checkout Repo
          uses: actions/checkout@v4

        - name: Docker Login
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME}}
            password: ${{ secrets.DOCKERHUB_PASSWORD}}
        
        - name: Docker Build For Testing
          uses: docker/build-push-action@v4
          with:
            context: .
            push: false
            tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
        
        - name: Docker Image Testing
          run: |
                docker images

                docker run --name solar-system-app -d \
                -p 3000:3000 \
                -e MONGO_URI=$MONGO_URI \
                -e MONGO_USERNAME=$MONGO_USERNAME \
                -e MONGO_PASSWORD=$MONGO_PASSWORD \
                ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

                export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
                echo $IP

                echo "Testing Image URL using wget"
                wget -q -O - 127.0.0.1:3000/live | grep live

        - name: Docker Push
          uses: docker/build-push-action@v4
          with:
            context: .
            push: true
            tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

  dev-deploy:
      if: contains(github.ref, 'feature/')
      needs: docker
      uses: ./.github/workflows/reuse-deployment.yaml
      with:
        environment_name: development
        namespace: development
        replicas: "1"
        manifests_path: kubernetes/development/
        mongodb_uri: ${{ vars.MONGO_URI}}
      secrets:
        AWS_ACCESS_KEY_ID: ${{ secrets.0 }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
      
  dev-integration-testing:
      if: contains(github.ref, 'feature/')
      name: Dev Integration Testing
      needs: dev-deploy
      runs-on: ubuntu-latest

      steps:
        - name: Test URL Output using CURL and JQq
          env:
            URL: ${{ needs.dev-deploy.outputs.APP_INGRESS_HOST}}
          run: |
            echo $URL
            echo "----------------------------------------"
            curl http://$URL/live -s -k | jq -r .status | grep -i live

  prod-deploy:
      if: github.ref == 'refs/heads/main'
      needs: docker
      uses: ./.github/workflows/reuse-deployment.yaml
      with:
        environment_name: production
        namespace: production
        replicas: "3"
        manifests_path: kubernetes/production/
        mongodb_uri: ${{ vars.MONGO_URI}}
      secrets: inherit
      
  prod-integration-testing:
      if: github.ref == 'refs/heads/main'
      name: Prod Integration Testing
      needs: prod-deploy
      runs-on: ubuntu-latest

      steps:
        - name: Test URL Output using CURL and JQ
          env:
            URL: ${{ needs.prod-deploy.outputs.APP_INGRESS_HOST}}
          run: |
            echo $URL
            echo "----------------------------------------"
            curl http://$URL/live -s -k | jq -r .status | grep -i live